  <script>
    (() => {
      'use strict'
      const storedTheme = localStorage.getItem('theme')
      if (storedTheme) {
        document.documentElement.setAttribute('data-bs-theme', storedTheme)
      }
    })()
  </script>
  <title>ControlVA - Iniciar Sesión</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="d-flex flex-column justify-content-center align-items-center vh-100">

<div class="position-absolute top-0 end-0 p-3">
    <button class="btn btn-secondary theme-switch" id="theme-toggle" title="Cambiar Tema">
        <i class="bi bi-moon-stars-fill"></i>
        <i class="bi bi-sun-fill"></i>
    </button>
</div>

<div class="card shadow-lg p-4" style="width: 24rem;">
    <div class="card-body text-center">
      
      <img src="logo.png" alt="Logo de Comercial VA" style="width: 120px; margin-bottom: 1rem;">

      <h3 class="card-title mb-1">ControlVA</h3>
      <p class="card-subtitle mb-4 text-muted">Gestión de Equipos</p>

      <form id="loginForm">
        <div class="mb-3">
          <input type="text" class="form-control" id="usuario" placeholder="Usuario" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
        </div>
        
        <div class="text-end mb-3">
            <a href="recuperar.php">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <hr class="my-3">

      <a href="registro.php" class="btn btn-success w-100">Registrarse</a>

    </div>
    <div class="card-footer text-center bg-transparent border-0 pt-3">
        <small class="text-muted">Creado por Hector Garcia</small>
    </div>
</div>

<div class="mt-4">
    <a href="https://docs.google.com/document/d/1u2ZS0_-u_mz1dHrR8UsHhZlP8DN6AGzQ2GkUEGeEfRo/edit?usp=sharing" target="_blank" class="btn btn-info text-white">
      <i class="bi bi-question-circle-fill me-2"></i>¿Cómo se usa?
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const themeToggle = document.getElementById('theme-toggle');
const htmlEl = document.documentElement;
themeToggle.addEventListener('click', () => {
  const currentTheme = htmlEl.getAttribute('data-bs-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  htmlEl.setAttribute('data-bs-theme', newTheme);
  localStorage.setItem('theme', newTheme);
});

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    let datos = new URLSearchParams();
    datos.append("accion","login");
    datos.append("usuario", document.getElementById("usuario").value);
    datos.append("password", document.getElementById("password").value);

    fetch("api.php",{ method:"POST", body:datos })
      .then(res=>res.json())
      .then(data=>{
        if (data.success) {
          window.location = "panel.php";
        } else {
          Swal.fire({
            icon: "error",
            title: "Acceso denegado",
            text: data.message || "Usuario o contraseña incorrectos"
          });
        }
      })
      .catch(err=>{
        Swal.fire("Error","No se pudo conectar con el servidor","error");
        console.error(err);
      });
});
</script>
</body>
</html>
